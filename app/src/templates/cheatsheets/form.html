<div class="button_bar">
  <h1>{{ title }}</h1>
  <p><a href="#" class="button secondary">Layout</a><a href="#" class="button" id="renderpreview">Render (CTRL+R)</a></p>
</div>

<div id="cheatsheet_meta">
  {{ form form }}
</div>

<div id="edit_cheatsheet">
  <div id="editor_wrapper">
    <div id="editor">{{ markdown }}</div>
  </div>
  <div id="cs_preview">
    <object data="/output/{{ cheatsheet.user_id }}/{{ cheatsheet.filename }}" type="application/pdf">
      <div>No PDF viewer available</div>
    </object>
  </div>
</div>
