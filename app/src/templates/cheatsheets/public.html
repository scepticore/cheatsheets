<div class="block">
  <div class="block_content">
    <div class="cards">
      <h1>Public cheatsheets by the community</h1>
    </div>
    <div>
      <search>
        <form>
          <input type="text" id="search_public" placeholder="Search by title..." class="search_input" />
        </form>
      </search>

    </div>
    <div class="grid">
      {{ for cheatsheet in cheatsheets }}
      <article class="card cheatsheet" data-title="{{ cheatsheet.title }}">
        <div class="card-media">
          <a href="/cheatsheets/{{ cheatsheet.id }}">
            <img src="{{ cheatsheet.image }}" alt="{{ cheatsheet.title }}"/>
          </a>
        </div>
        <div class="card-content">
          <h2>
            <a href="/cheatsheets/{{ cheatsheet.id }}">{{ cheatsheet.title }}</a>
          </h2>
          <p>{{ cheatsheet.description }}</p>

          <div class="button_bar">
            <a href="/cheatsheets/{{ cheatsheet.id }}" class="button primary"><i class="bi bi-eye-fill"></i> View</a>
            <a href="{{ cheatsheet.file }}" target="_blank" title="File opens in a new tab" class="button secondary"><i
                class="bi bi-cloud-download-fill"></i> Download</a>
          </div>
        </div>

      </article>
      {{ endfor }}
    </div>
  </div>
</div>
